shell /bin/bash

include ./themes/rose-pine.conf

font_size 		14.0

font_family 		JetBrainsMono Nerd Font Mono
bold_font 		auto
italic_font 		auto
bold_italic_font 	auto

hide_window_decorations titlebar-and-corners

map super+shift+return launch --location=hsplit
map super+return launch --location=vsplit

editor /opt/homebrew/bin/nvim

background_image_layout centered
window_padding_width 15

enabled_layouts splits

background_opacity 1.0
# background_blur 40

macos_option_as_alt yes
# cursor_trail 1000

allow_remote_control yes
listen_on unix:/tmp/mykitty

# mappings
map super+shift+t new_tab_with_cwd
map super+] next_window
map super+[ previous_window

share_connections no


# BEGIN_KITTY_THEME
# Rosé Pine
include current-theme.conf
# END_KITTY_THEME
